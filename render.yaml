services:
  - type: web
    name: mansfield-sulfidity-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MILL_CONFIG
        value: "mansfield"
    healthCheckPath: /api/health
